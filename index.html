        const App = () => {
            const [view, setView] = useState('dashboard');
            const [students, setStudents] = useState(INITIAL_STUDENTS);
            const [leaveRecords, setLeaveRecords] = useState([]);

            // Native Excel File Reader (.xlsx / .xls) with automatic column alignment correction
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];

                    // Read sheet rows as raw array of arrays
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    if (rows.length < 2) {
                        alert("The sheet does not contain enough data rows.");
                        return;
                    }

                    const headers = rows[0];
                    
                    // Helper to safely read and clean values
                    const getVal = (row, idx) => {
                        const val = row[idx];
                        if (val === undefined || val === null) return '';
                        if (val instanceof Date) {
                            return val.toISOString().split('T')[0];
                        }
                        return String(val).trim();
                    };

                    // Detect shifted layout pattern by checking if headers[13] is 'Residential Type' and headers[14] is 'Gender'
                    const isShiftedPattern = headers[13] === 'Residential Type' && headers[14] === 'Gender';
                    const parsedStudents = [];

                    for (let i = 1; i < rows.length; i++) {
                        const r = rows[i];
                        if (!r || r.length === 0 || !r[2]) continue; // Skip empty rows or rows without student name

                        let record = {};
                        if (isShiftedPattern) {
                            // Map using our manual offset shift correction
                            const fatherMobile = getVal(r, 26);
                            const motherMobile = getVal(r, 27);
                            const parentMobile = (fatherMobile && fatherMobile !== 'NIL') ? fatherMobile : (motherMobile !== 'NIL' ? motherMobile : '');

                            record = {
                                'Student Name': getVal(r, 2),
                                'Register No': getVal(r, 1),
                                'Department': getVal(r, 5), // Map Section to Department
                                'Batch': getVal(r, 4),
                                'Year': '2nd Year',
                                'Contact Number': getVal(r, 25), // Map Mobile
                                'Parent Number': parentMobile
                            };
                        } else {
                            // Standard layout fallback - map headers directly
                            const getHeaderIdx = (nameMatches) => {
                                return headers.findIndex(h => h && nameMatches.some(m => String(h).trim().toLowerCase().includes(m.toLowerCase())));
                            };
                            
                            const nameIdx = getHeaderIdx(['student name', 'name']);
                            const regIdx = getHeaderIdx(['register no', 'register number', 'reg no']);
                            const deptIdx = getHeaderIdx(['department', 'section', 'course']);
                            const batchIdx = getHeaderIdx(['batch', 'year joined']);
                            const mobileIdx = getHeaderIdx(['mobile', 'phone', 'contact']);
                            const fatherIdx = getHeaderIdx(['father mobile', 'father phone', 'father contact']);
                            const motherIdx = getHeaderIdx(['mother mobile', 'mother phone', 'mother contact']);
                            
                            const fatherMobile = fatherIdx !== -1 ? getVal(r, fatherIdx) : '';
                            const motherMobile = motherIdx !== -1 ? getVal(r, motherIdx) : '';
                            const parentMobile = (fatherMobile && fatherMobile !== 'NIL') ? fatherMobile : (motherMobile !== 'NIL' ? motherMobile : '');

                            record = {
                                'Student Name': nameIdx !== -1 ? getVal(r, nameIdx) : '',
                                'Register No': regIdx !== -1 ? getVal(r, regIdx) : '',
                                'Department': deptIdx !== -1 ? getVal(r, deptIdx) : '',
                                'Batch': batchIdx !== -1 ? getVal(r, batchIdx) : '',
                                'Year': '2nd Year',
                                'Contact Number': mobileIdx !== -1 ? getVal(r, mobileIdx) : '',
                                'Parent Number': parentMobile
                            };
                        }
                        parsedStudents.push(record);
                    }

                    setStudents(parsedStudents);
                    alert(`Success: Imported ${parsedStudents.length} student records directly from your Excel file!`);
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-slate-200 p-6 flex flex-col">

                        </div>
                        <nav className="space-y-2 flex-1">
                            <NavItem active={view === 'dashboard'} icon={<LayoutDashboard size={18} />} label="Dashboard" onClick={() => setView('dashboard')} />
                            <NavItem active={view === 'reports'} icon={<FileText size={18} />} label="Leave Reports" onClick={() => setView('reports')} />
                            <NavItem active={view === 'admin'} icon={<UserPlus size={18} />} label="Admin Database" onClick={() => setView('admin')} />
                        </nav>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-8 overflow-y-auto">
                        {view === 'dashboard' && <DashboardView students={students} leaveRecords={leaveRecords} setLeaveRecords={setLeaveRecords} />}
                        {view === 'reports' && <ReportsView leaveRecords={leaveRecords} setLeaveRecords={setLeaveRecords} />}
                        {view === 'admin' && <AdminView handleExcelUpload={handleExcelUpload} studentCount={students.length} />}
                    </main>
                </div>
            );
        };

        const NavItem = ({ icon, label, onClick, active }) => (
            <button
                onClick={onClick}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all ${active ? 'bg-blue-50 text-blue-600 font-semibold border-l-4 border-blue-600' : 'text-slate-600 hover:bg-slate-50'}`}
            >
                {icon} <span className="text-sm">{label}</span>
            </button>
        );

        const DashboardView = ({ students, leaveRecords, setLeaveRecords }) => {
            const [search, setSearch] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [reason, setReason] = useState('');
            const [notes, setNotes] = useState('');

            const handleSearch = () => {
                const searchClean = search.trim().toLowerCase();
                if (!searchClean) return;

                // Find student by exact Register No, then substring match of name
                const found = students.find(s => {
                    const reg = s['Register No'] ? String(s['Register No']).trim().toLowerCase() : '';
                    const name = s['Student Name'] ? String(s['Student Name']).trim().toLowerCase() : '';
                    return reg === searchClean || name.includes(searchClean);
                });

                if (!found) {
                    alert("Student not found. Try searching with a different Register Number or Name.");
                    setSelectedStudent(null);
                } else {
                    setSelectedStudent(found);
                }
            };

            const submitLeave = (e) => {
                e.preventDefault();
                const newRecord = {
                    ...selectedStudent,
                    date: new Date().toLocaleDateString('en-CA'), // ISO standard YYYY-MM-DD
                    reason: reason,
                    notes: notes
                };
                setLeaveRecords([...leaveRecords, newRecord]);
                alert("Leave Saved Successfully!");
                setSelectedStudent(null);
                setReason('');
                setNotes('');
                setSearch('');
            };

            const renderField = (label, val) => (
                <div className="flex flex-col sm:flex-row sm:justify-between border-b border-dashed border-slate-100 py-2.5 gap-1">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">{label}:</span>
                    <span className="text-sm font-bold text-slate-800 break-all text-right">{val || 'N/A'}</span>
                </div>
            );

            return (
                <div className="space-y-6">
                    {/* Search Panel */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h2 className="text-lg font-semibold text-slate-800 mb-2">Search Student Profile</h2>
                        <p className="text-sm text-slate-500 mb-4">Search instantly using Register Number or Student Name.</p>
                        <div className="flex gap-2">
                            <input
                                className="flex-1 border border-slate-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm"
                                placeholder="Enter Register Number (e.g. 110725105002) or Student Name..."
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSearch()}
                            />
                            <button onClick={handleSearch} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow-sm transition">Search</button>
                        </div>
                    </div>

                    {selectedStudent && (
                        <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
                            {/* Student Profile Card */}
                            <div className="xl:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
                                <div>
                                    {/* Header with avatar and quick info */}
                                    <div className="flex items-center gap-4 border-b pb-4 mb-4">
                                        <div className="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-500 text-white flex items-center justify-center font-bold text-2xl shadow-md uppercase">
                                            {selectedStudent['Student Name'] ? selectedStudent['Student Name'].split(' ')[0][0] : '?'}
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-extrabold text-slate-800">{selectedStudent['Student Name']}</h3>
                                            <p className="text-sm text-blue-600 font-bold">{selectedStudent['Department'] || 'N/A'}</p>
                                            <p className="text-xs text-slate-400 font-medium">Reg No: {selectedStudent['Register No'] || 'N/A'}</p>
                                        </div>
                                    </div>

                                    {/* Minimalist Profile Fields */}
                                    <div className="flex-1 space-y-2 pr-1">
                                        {renderField('Full Name', selectedStudent['Student Name'])}
                                        {renderField('Register No', selectedStudent['Register No'])}
                                        {renderField('Department', selectedStudent['Department'])}
                                        {renderField('Batch', selectedStudent['Batch'])}
                                        {renderField('Year', selectedStudent['Year'])}
                                        {renderField('Contact Number', selectedStudent['Contact Number'])}
                                        {renderField('Parent/Guardian Number', selectedStudent['Parent Number'])}
                                    </div>
                                </div>
                            </div>

                            {/* Leave Report Form */}
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 border-b pb-3 mb-4">Create Leave Entry</h3>
                                    <form onSubmit={submitLeave} className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-slate-500 mb-1">Date</label>
                                            <input type="date" defaultValue={new Date().toISOString().split('T')[0]} className="w-full border rounded-lg p-2.5 bg-slate-50 text-slate-600 text-sm" disabled />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-slate-500 mb-1">Reason for Leave</label>
                                            <textarea
                                                value={reason}
                                                onChange={(e) => setReason(e.target.value)}
                                                className="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 text-sm"
                                                rows="3"
                                                placeholder="Reason for absence..."
                                                required
                                            ></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold uppercase text-slate-500 mb-1">Additional Remarks</label>
                                            <input
                                                value={notes}
                                                onChange={(e) => setNotes(e.target.value)}
                                                className="w-full border rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 text-sm"
                                                placeholder="Doctor certificate submitted / Prior permission"
                                            />
                                        </div>
                                        <div className="flex gap-2 pt-2">
                                            <button type="submit" className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg shadow-sm transition text-sm">Save Report</button>
                                            <button type="button" onClick={() => setSelectedStudent(null)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold px-4 rounded-lg transition text-sm">Clear</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ReportsView = ({ leaveRecords, setLeaveRecords }) => {
            const [filterTerm, setFilterTerm] = useState('');

            const filteredRecords = leaveRecords.filter(r => {
                const name = r['Student Name'] ? String(r['Student Name']).toLowerCase() : '';
                const reg = r['Register No'] ? String(r['Register No']).toLowerCase() : '';
                const dept = r['Department'] ? String(r['Department']).toLowerCase() : '';
                const match = filterTerm.toLowerCase();
                return name.includes(match) || reg.includes(match) || dept.includes(match);
            });

            const exportToExcel = () => {
                if (filteredRecords.length === 0) return alert("No records available to export!");
                const ws = XLSX.utils.json_to_sheet(filteredRecords);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Leave Log");
                XLSX.writeFile(wb, "HOD_Student_Leaves.xlsx");
            };

            const printReport = () => {
                window.print();
            };

            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                        <div>
                            <h2 className="text-xl font-bold text-slate-800">Leave Logs & History</h2>
                            <p className="text-xs text-slate-500">Live operational view of leave logs registered today</p>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto">
                            <button onClick={printReport} className="flex items-center gap-2 bg-slate-100 border text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-200 transition text-sm font-semibold">
                                <Printer size={16} /> Print Page
                            </button>
                            <button onClick={exportToExcel} className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition text-sm font-semibold">
                                <Download size={16} /> Export Excel
                            </button>
                        </div>
                    </div>

                    <div className="mb-4">
                        <input
                            className="w-full md:w-80 border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                            placeholder="Filter by Name, Reg No, or Dept..."
                            onChange={(e) => setFilterTerm(e.target.value)}
                        />
                    </div>

                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 border-b text-slate-600 font-semibold uppercase text-xs">
                                <tr>
                                    <th className="p-4">Reg No</th>
                                    <th className="p-4">Student Name</th>
                                    <th className="p-4">Department</th>
                                    <th className="p-4">Leave Reason</th>
                                    <th className="p-4">Recorded On</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100 text-slate-700">
                                {filteredRecords.length > 0 ? (
                                    filteredRecords.map((r, i) => (
                                        <tr key={i} className="hover:bg-slate-50">
                                            <td className="p-4 font-semibold text-blue-600">{r['Register No']}</td>
                                            <td className="p-4">{r['Student Name']}</td>
                                            <td className="p-4">{r['Department'] || 'N/A'}</td>
                                            <td className="p-4">{r.reason}</td>
                                            <td className="p-4 text-slate-500">{r.date}</td>
                                        </tr>
                                    ))
                                ) : (
                                    <tr>
                                        <td colSpan="5" className="p-8 text-center text-slate-400">No matching leave records found.</td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const AdminView = ({ handleExcelUpload, studentCount }) => (
            <div className="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200 text-center">
                <h2 className="text-xl font-bold text-slate-800 mb-2">Import Student Records</h2>
                <p className="text-sm text-slate-500 mb-6">Import clean XLS / XLSX files straight from Microsoft Excel. Columns parsed dynamically.</p>
                <div className="border-2 border-dashed border-blue-200 rounded-lg p-10 bg-slate-50 hover:bg-blue-50/50 transition">
                    <Upload className="mx-auto text-blue-500 mb-4" size={48} />
                    <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} className="hidden" id="excelInput" />
                    <label htmlFor="excelInput" className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg inline-block shadow transition">
                        Select Excel File (.xlsx)
                    </label>
                    <p className="mt-4 text-xs text-slate-400">Required columns: Student Name, Register No, Department/Section, Batch, Mobile/Phone, Father/Mother Contact</p>
                </div>
                <div className="mt-6 border-t pt-4">
                    <p className="text-sm text-slate-600">Currently Loaded Dataset Size: <strong className="text-blue-600">{studentCount} Students</strong></p>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
